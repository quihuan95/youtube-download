# Render.com — dễ deploy nhưng free tier timeout ~30s, tải video dài dễ lỗi.
# Khuyên dùng Fly.io hoặc VPS (xem DEPLOY.md).
services:
  - type: web
    name: tool-video
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: HOST
        value: 0.0.0.0
      - key: YOUTUBE_DL_SKIP_DOWNLOAD
        value: "1"
      - key: YT_DLP_PATH
        value: /usr/bin/yt-dlp
      # RENDER_EXTERNAL_URL do Render tự gán — server log hiện đúng URL public
